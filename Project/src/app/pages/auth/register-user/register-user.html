<div class="page-wrapper">

  <!-- LEFT: Hero Section -->
  <div class="hero-section">
    <div class="glass-card">
      <a class="brand" routerLink="/home" aria-label="Go to home page">
        <span class="brand-lanka">Lanka</span><span class="brand-stay">Stay.</span>
      </a>
    </div>
  </div>

  <!-- RIGHT: Form Section -->
  <div class="form-section">
    <div class="form-container">
      <h1 class="form-title">Create Account</h1>

      <div class="field-group">
        <label class="field-label">Name</label>
        <input
          class="field-input"
          type="text"
          placeholder="Enter your name"
          [(ngModel)]="name"
          name="name"
        />
      </div>

      <div class="field-group">
        <label class="field-label">E mail</label>
        <input
          class="field-input"
          type="email"
          placeholder="name@gmail.com"
          [(ngModel)]="email"
          name="email"
        />
      </div>

      <div class="field-group">
        <label class="field-label">Phone No</label>
        <input
          class="field-input"
          type="tel"
          placeholder="With Country Code"
          [(ngModel)]="phone"
          name="phone"
        />
      </div>

      <div class="field-group">
        <label class="field-label">Country</label>
        <input
          class="field-input"
          type="text"
          placeholder="Country Name"
          [(ngModel)]="country"
          name="country"
        />
      </div>

      <div class="field-group">
        <label class="field-label">Username</label>
        <input
          class="field-input"
          type="text"
          placeholder="Username"
          [(ngModel)]="username"
          name="username"
        />
      </div>

      <div class="field-group">
        <label class="field-label">Password</label>
        <div class="password-wrapper">
          <input
            class="field-input password-input"
            [type]="showPassword ? 'text' : 'password'"
            placeholder="6+ characters"
            [(ngModel)]="password"
            name="password"
          />
          <button
            type="button"
            class="eye-toggle"
            (click)="togglePassword()"
            aria-label="Toggle password visibility"
          >
            <svg *ngIf="!showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/>
              <path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/>
              <line x1="1" y1="1" x2="23" y2="23"/>
            </svg>
            <svg *ngIf="showPassword" xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#aaa" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
              <circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>

      <p class="terms-text">
        By signing up you agree to
        <a href="#" class="terms-link">terms and conditions</a>
        at zoho.
      </p>

      <p *ngIf="errorMessage" class="form-error">{{ errorMessage }}</p>

      <button class="register-btn" type="button" (click)="onRegister()" [disabled]="isLoading">
        {{ isLoading ? 'Registering...' : 'Register' }}
      </button>

      <div class="login-link-wrapper">
        <a routerLink="/login" class="login-link">Login</a>
      </div>
    </div>
  </div>

</div>
