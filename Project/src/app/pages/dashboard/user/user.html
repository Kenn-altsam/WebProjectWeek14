<section class="profile-page">
  <div class="profile-panel">
    <p *ngIf="isLoading" class="muted">Loading profile...</p>

    <ng-container *ngIf="!isLoading && user">
      <p class="eyebrow">My Account</p>
      <h1>{{ user.username }}</h1>

      <dl class="profile-details">
        <div>
          <dt>User ID</dt>
          <dd>{{ user.id }}</dd>
        </div>
        <div>
          <dt>Email</dt>
          <dd>{{ user.email }}</dd>
        </div>
        <div>
          <dt>Phone</dt>
          <dd>{{ user.phone || 'Not added' }}</dd>
        </div>
      </dl>

      <a class="home-link" routerLink="/home">Back to home</a>
    </ng-container>

    <ng-container *ngIf="!isLoading && errorMessage">
      <p class="profile-error">{{ errorMessage }}</p>
      <button class="login-link" type="button" (click)="goToLogin()">Login</button>
    </ng-container>
  </div>
</section>
