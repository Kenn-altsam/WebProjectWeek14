<a class="most-picked-grid-link" [routerLink]="['/hotels', hotel.id]">
  <div
    class="main"
    [attr.data-title]="'$' + hotel.price + ' per night'"
    [style.background-image]="'url(' + (hotel.images?.[0] || hotelImageUrl) + ')'"
  >
    <p class="name">{{ hotel.name }}</p>
    <p class="location">{{ hotel.location }}</p>
  </div>
</a>
